<ion-header [translucent]="true">
  <ion-toolbar color="success">
    <ion-title>Our Work</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="ion-padding">
    <h2>Activity Gallery</h2>
    <p>Real photos of our plantation drives in Berhampur.</p>

  <ion-grid>
    <ion-row>
      <ion-col size="6">
        <ion-card>
          <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=400" />
          <ion-card-content>Tree Drive</ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card>
          <img src="https://images.unsplash.com/photo-1615461066870-40c144056e52?w=400" />
          <ion-card-content>Blood Camp</ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="6">
        <ion-card>
          <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=400" />
          <ion-card-content>Our Team</ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card>
          <img src="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?w=400" />
          <ion-card-content>Clean City</ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
