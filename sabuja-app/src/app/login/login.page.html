<ion-header>
  <ion-toolbar color="success">
    <ion-title>BSB Member Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="ion-text-center" style="margin-top: 30px;">
    <ion-icon name="person-circle-outline" style="font-size: 70px; color: #2e7d32;"></ion-icon>
    <h3>Welcome Back</h3>
  </div>

  <ion-list lines="full">
    <ion-item>
      <ion-label position="floating">Email</ion-label>
      <ion-input type="email" [(ngModel)]="email"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Password</ion-label>
      <ion-input type="password" [(ngModel)]="password"></ion-input>
    </ion-item>
  </ion-list>

  <div class="ion-padding-top">
    <ion-button expand="block" color="success" shape="round" (click)="login()">Login</ion-button>
    <ion-button expand="block" fill="clear" color="medium" routerLink="/register">
      Don't have an account? Create one
    </ion-button>
  </div>
</ion-content>
