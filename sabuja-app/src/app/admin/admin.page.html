<ion-header>
  <ion-toolbar color="success">
    <ion-title>BSB Admin Panel</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="text-align: center; margin-bottom: 20px;">
    <h2 style="font-weight: bold; color: #2e7d32;">Pending Verifications</h2>
    <p>Check your bank for these UTR numbers</p>
  </div>

  <ion-card *ngFor="let p of pendingPayments" style="border-left: 5px solid #ff9800; border-radius: 10px;">
    <ion-card-header>
      <ion-card-title>₹{{ p.amount }} - {{ p.userName }}</ion-card-title>
      <ion-card-subtitle>UTR: <strong>{{ p.utrNumber }}</strong></ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p><strong>Purpose:</strong> {{ p.purpose }}</p>
      <p><strong>Date:</strong> {{ p.date }}</p>
      <div style="margin-top: 15px; display: flex; gap: 10px;">
        <ion-button color="success" (click)="approve(p.id)">APPROVE</ion-button>
        <ion-button color="danger" fill="outline" (click)="reject(p.id)">REJECT</ion-button>
      </div>
    </ion-card-content>
  </ion-card>

  <div *ngIf="pendingPayments.length === 0" style="text-align: center; margin-top: 50px; color: #999;">
    <ion-icon name="checkmark-done-circle-outline" style="font-size: 64px;"></ion-icon>
    <p>All contributions are verified!</p>
  </div>
</ion-content>
