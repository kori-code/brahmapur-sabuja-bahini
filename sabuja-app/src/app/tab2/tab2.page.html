<ion-header [translucent]="true">
  <ion-toolbar color="success">
    <ion-title>Support BSB</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div style="text-align: center; margin-bottom: 20px;">
    <ion-icon name="cash-outline" style="font-size: 64px; color: #2e7d32;"></ion-icon>
    <h2 style="font-weight: bold;">Make a Difference</h2>
    <p>Your contribution helps us keep Brahmapur green.</p>
  </div>

  <ion-list lines="full" class="ion-margin-bottom">
    <ion-item>
      <ion-label position="floating">Amount (₹)</ion-label>
      <ion-input type="number" placeholder="Enter amount" [(ngModel)]="paymentAmount"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Purpose of Contribution</ion-label>
      <ion-select placeholder="Select Purpose" [(ngModel)]="paymentPurpose">
        <ion-select-option value="Monthly Subscription">Monthly Subscription</ion-select-option>
        <ion-select-option value="General Donation">General Donation</ion-select-option>
        <ion-select-option value="Plantation Drive">Tree Plantation Support</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Message / Note</ion-label>
      <ion-textarea placeholder="Why are you contributing today?" [(ngModel)]="paymentNote" rows="3"></ion-textarea>
    </ion-item>
  </ion-list>

  <ion-button expand="block" color="success" shape="round" style="margin-top: 20px; height: 50px;" (click)="payNow()">
    Proceed to Pay ₹{{ paymentAmount || 0 }}
  </ion-button>

  <p class="ion-text-center" style="font-size: 0.8em; color: #888; margin-top: 15px;">
    Secure Payment Powered by BSB Gateway
  </p>
</ion-content>
