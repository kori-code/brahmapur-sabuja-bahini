<ion-header [translucent]="true">
  <ion-toolbar color="success">
    <ion-title>BSB Home</ion-title>
    <!-- Top Right Login Icon -->
    <ion-buttons slot="end">
      <ion-button routerLink="/login">
        <ion-icon slot="icon-only" name="person-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding ion-text-center">
  <div style="margin-top: 40px;">
    <!-- BSB Logo -->
    <div style="display: flex; justify-content: center;">
      <img src="assets/icon/favicon.png" 
           style="width: 140px; height: 140px; border-radius: 50%; border: 4px solid #ffffff; box-shadow: 0px 4px 12px rgba(0,0,0,0.15);" />
    </div>
    
    <h1 style="color: #2e7d32; font-weight: bold; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; font-size: 1.4rem;">
      Brahmapur Sabuja Bahini
    </h1>
    <p style="font-style: italic; color: #666; font-size: 0.9rem;">"Green City, Clean City"</p>
  </div>

  <!-- Mission Card -->
  <ion-card style="margin-top: 30px; text-align: left; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <ion-card-header>
      <ion-card-title color="success" style="font-size: 1.1rem; font-weight: bold;">Our Mission</ion-card-title>
    </ion-card-header>
    <ion-card-content style="color: #444; line-height: 1.6;">
      To promote environmental awareness and sustainable living in Brahmapur through community action and tree plantation drives.
    </ion-card-content>
  </ion-card>

  <!-- Navigation Buttons -->
  <div style="margin-top: 25px; padding: 0 10px;">
    <ion-button expand="block" color="success" routerLink="/login" style="height: 50px; font-weight: bold;">
      MEMBER LOGIN
    </ion-button>
    
    <ion-button expand="block" fill="outline" color="success" routerLink="/register" style="margin-top: 12px; height: 50px;">
      JOIN AS VOLUNTEER
    </ion-button>
  </div>

  <p style="margin-top: 20px; color: #999; font-size: 0.8rem;">
    Together for a Greener Odisha
  </p>
</ion-content>
