<ion-header [translucent]="true">
  <ion-toolbar color="success">
    <ion-title>BSB Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding ion-text-center">
  <div style="margin-top: 40px;">
    <img src="assets/icon/favicon.png" style="width: 150px; height: 150px; border-radius: 50%; border: 3px solid #2e7d32;" />
    
    <h1 style="color: #2e7d32; font-weight: bold; margin-top: 20px; text-transform: uppercase;">
      Brahmapur Sabuja Bahini
    </h1>
    <p style="font-style: italic; color: #666;">"Green City, Clean City"</p>
  </div>

  <ion-card style="margin-top: 30px; text-align: left;">
    <ion-card-header>
      <ion-card-title color="success">Our Mission</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      To promote environmental awareness and sustainable living in Brahmapur through community action and tree plantation drives.
    </ion-card-content>
  </ion-card>
</ion-content>
